<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#121212; color:white; }
  </style>
</head>

<body>

<header class="bg-black p-3">
  <nav class="container d-flex justify-content-between">
    <h4>Sistema</h4>
    <div>
      <a href="cadastro.html" class="btn btn-success">Cadastrar</a>
      <a href="listagem.html" class="btn btn-warning">Listagem</a>
      <button onclick="logout()" class="btn btn-danger">Sair</button>
    </div>
  </nav>
</header>

<main class="container mt-4">
  <h2>Dashboard</h2>

  <div class="card p-3 text-dark">
    <h5>Total de Produtos</h5>
    <p id="total">0</p>
  </div>
</main>

<script>
if(localStorage.getItem("logado") !== "true"){
  window.location.href = "login.html";
}

function logout(){
  localStorage.removeItem("logado");
  window.location.href = "login.html";
}

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
document.getElementById("total").innerText = produtos.length;
</script>

</body>
</html>
