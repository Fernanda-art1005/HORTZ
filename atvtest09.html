<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio Prático - Layouts Responsivos</title>
<style>
/* CONFIGURAÇÕES GERAIS */
* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: sans-serif;
}

body {
background-color: #ffffff;
padding: 20px;
}

nav {
display: flex;
justify-content: center;
gap: 10px;
margin-bottom: 30px;
}

button {
padding: 10px 15px;
cursor: pointer;
border: none;
background: #ffaade;
border-radius: 5px;
}

button.active {
background: #ff83cb;
color: rgb(255, 255, 255);
}

.page {
display: none;
max-width: 1200px;
margin: 0 auto;
}

.page.active {
display: block;
}

/* 1. LOGIN (Mobile First) */
.login-container {
width: 100%; /* 100% no mobile */
background: white;
padding: 2rem;
border-radius: 8px;
box-shadow: 0 4px 6px rgba(255, 88, 158, 0.1);
}

/* 2. DASHBOARD (Mobile First) */
.dashboard-grid {
display: flex;
flex-direction: column; /* Empilhado no mobile */
gap: 15px;
}

.menu-item {
background: #ff9cbd;
color: white;
padding: 20px;
text-align: center;
border-radius: 5px;
}S

/* 3. FORMULÁRIO (Mobile First) */
.form-grid {
display: grid;
grid-template-columns: 1fr; /* Uma coluna no mobile */
gap: 15px;
}

input {
width: 100%;
padding: 10px;
margin-top: 5px;
}

/* --- BREAKPOINTS --- */

/* Tablet (768px) e Desktop (1024px) */
@media (min-width: 768px) {

/* Login: Centralizado e menor */
.login-container {
width: 400px;
margin: 50px auto;
}

/* Dashboard: Lado a lado */
.dashboard-grid {
flex-direction: row;
flex-wrap: wrap;
}

.menu-item {
flex: 1;
min-width: 200px;
}

/* Formulário: Duas colunas */
.form-grid {
grid-template-columns: 1fr 1fr;
}
}

</style>
</head>
<body>

<nav>
<button onclick="showPage('login')" id="btn-login" class="active">Login</button>
<button onclick="showPage('dash')" id="btn-dash">Dashboard</button>
<button onclick="showPage('form')" id="btn-form">Formulário</button>
</nav>

<div id="login" class="page active">
<div class="login-container">
<h2>Login</h2>
<p>Acesso ao Sistema</p>
<br>
<input type="text" placeholder="Usuário">
<input type="password" placeholder="Senha">
<br><br>
<button style="width: 100%; background: #ff3c77; color: white;">Entrar</button>
</div>
</div>

<div id="dash" class="page">
<h2>Dashboard Inicial</h2>
<br>
<div class="dashboard-grid">
<div class="menu-item">Vendas</div>
<div class="menu-item">Relatórios</div>
<div class="menu-item">Estoque</div>
<div class="menu-item">Configurações</div>
</div>
</div>

<div id="form" class="page">
<h2>Cadastro de Produto/Usuário</h2>
<br>
<div class="form-grid">
<div>
<label>Nome:</label>
<input type="text">
</div>
<div>
<label>E-mail / SKU:</label>
<input type="text">
</div>
<div>
<label>Telefone / Categoria:</label>
<input type="text">
</div>
<div>
<label>Data:</label>
<input type="date">
</div>
</div>
</div>

<script>
function showPage(pageId) {
// Esconde todas as páginas
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
// Remove active dos botões
document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

// Mostra a página selecionada
document.getElementById(pageId).classList.add('active');
// Ativa o botão
document.getElementById('btn-' + pageId).classList.add('active');
}
</script>

</body>
</html>
