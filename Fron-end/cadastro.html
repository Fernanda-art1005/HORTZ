<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#121212; color:white; }
  </style>
</head>

<body>

<header class="bg-black p-3">
  <nav class="container">
    <a href="dashboard.html" class="btn btn-light">Voltar</a>
  </nav>
</header>

<main class="container mt-4">
  <h2>Cadastrar Produto</h2>

  <form onsubmit="salvar(event)">
    <input type="text" id="nome" class="form-control mb-2" placeholder="Nome" required>
    <input type="number" id="preco" class="form-control mb-2" placeholder="Preço" required>
    <input type="number" id="quantidade" class="form-control mb-3" placeholder="Quantidade" required>
    <button class="btn btn-success w-100">Salvar</button>
  </form>
</main>

<script>
if(localStorage.getItem("logado") !== "true"){
  window.location.href = "login.html";
}

function salvar(e){
  e.preventDefault();

  let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

  let produto = {
    nome: nome.value,
    preco: preco.value,
    quantidade: quantidade.value
  };

  produtos.push(produto);
  localStorage.setItem("produtos", JSON.stringify(produtos));

  alert("Produto cadastrado!");
  window.location.href = "listagem.html";
}
</script>

</body>
</html>
